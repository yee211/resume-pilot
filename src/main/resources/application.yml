# ==================== 服务端口 ====================
server:
  port: 8080

# ==================== 数据源（PostgreSQL） ====================
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resumepilot}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  # ==================== Redis ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:1}
      password: ${REDIS_PASSWORD:123456}

  # ==================== 文件上传 ====================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ==================== 邮件（发验证码） ====================
  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:your_email@qq.com}
    password: ${MAIL_PASSWORD:your_email_password}
    properties:
      mail:
        smtp:
          ssl:
            enable: true

# ==================== MyBatis Plus ====================
mybatis-plus:
  configuration:
    # SQL 日志（开发环境开启，生产环境关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 驼峰命名转换
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # Entity 扫描路径
  type-aliases-package: com.resumepilot.**.entity

# ==================== JWT ====================
jwt:
  secret: ${JWT_SECRET:ResumePilotSecretKey2026MustBeLongEnoughForHS256Algorithm}
  expiration: 86400000  # 24小时（毫秒）

# ==================== LangChain4j ====================
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:your_api_key_here}
      model-name: deepseek-v4-flash
      max-tokens: 8192
      temperature: 0.7
      timeout: PT120S

# ==================== 日志 ====================
logging:
  level:
    com.resumepilot: debug
